name: CI

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Run tests
        run: |
          git clone --depth 1 https://github.com/w2jmoe/WisePick.git /tmp/WisePick
          PYTHONPATH="${{ github.workspace }}:/tmp/WisePick" python -m pytest tests/test_chainweaver_adapter.py -v
